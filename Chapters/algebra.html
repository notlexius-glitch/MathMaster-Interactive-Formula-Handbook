<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Algebra Formulas</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<header>
    <h1>Algebra Formula Cheat Sheet</h1>
</header>

<main class="chapters">

    <div class="card">
        <h3>(a + b)²</h3>
        <p>a² + 2ab + b²</p>
    </div>

    <div class="card">
        <h3>(a - b)²</h3>
        <p>a² - 2ab + b²</p>
    </div>

    <div class="card">
        <h3>a² - b²</h3>
        <p>(a + b)(a - b)</p>
    </div>

    <div class="card">
        <h3>Quadratic Formula</h3>
        <p>x = (-b ± √(b² - 4ac)) / 2a</p>
    </div>

</main>

</body>
</html>
